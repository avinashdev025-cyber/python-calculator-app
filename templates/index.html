<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PyCalc - A premium, beautifully designed glassmorphic calculator web application with full calculation history, custom AST-safe math solver, and interactive animations.">
    <title>PyCalc | Premium Glassmorphic Web Calculator</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="dark-theme">
    <div class="background-decorations">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <!-- Main App Container -->
    <div class="app-container">
        <!-- App Header -->
        <header class="app-header">
            <div class="logo">
                <i class="fa-solid fa-calculator accent-color"></i>
                <h1>Py<span>Calc</span></h1>
            </div>
            <div class="header-actions">
                <button id="theme-toggle" class="icon-btn" aria-label="Toggle Theme" title="Toggle Theme">
                    <i class="fa-solid fa-sun icon-light"></i>
                    <i class="fa-solid fa-moon icon-dark"></i>
                </button>
                <button id="history-toggle" class="icon-btn" aria-label="Open History" title="View History">
                    <i class="fa-solid fa-history"></i>
                </button>
            </div>
        </header>

        <!-- Main Calculator Section -->
        <main class="calculator-card">
            <!-- Display Area -->
            <section class="calculator-display">
                <div class="display-row expression-row" id="display-expression" aria-live="polite"></div>
                <div class="display-row input-row">
                    <span class="equals-sign" id="equals-indicator" style="display: none;">=</span>
                    <div id="display-input" class="display-text size-default" aria-live="polite">0</div>
                </div>
                <div class="display-row preview-row" id="display-preview" aria-live="polite"></div>
            </section>

            <!-- Mode Selector / Info Area -->
            <div class="mode-info">
                <span class="mode-badge active" id="math-mode">STANDARD</span>
                <span class="scientific-toggle-btn" id="scientific-toggle">
                    <span>ADVANCED</span>
                    <i class="fa-solid fa-chevron-down"></i>
                </span>
            </div>

            <!-- Scientific Panel (Collapsible) -->
            <section class="scientific-panel collapsed" id="scientific-panel">
                <div class="scientific-grid">
                    <button class="btn btn-sci" data-action="func" data-val="sqrt">√</button>
                    <button class="btn btn-sci" data-action="operator" data-val="**">^</button>
                    <button class="btn btn-sci" data-action="func" data-val="sin">sin</button>
                    <button class="btn btn-sci" data-action="func" data-val="cos">cos</button>
                    <button class="btn btn-sci" data-action="func" data-val="tan">tan</button>
                    <button class="btn btn-sci" data-action="func" data-val="log">log</button>
                    <button class="btn btn-sci" data-action="func" data-val="ln">ln</button>
                    <button class="btn btn-sci" data-action="func" data-val="abs">abs</button>
                </div>
            </section>

            <!-- Keypad Area -->
            <section class="calculator-keypad">
                <!-- Row 1 -->
                <button class="btn btn-action" id="btn-clear" data-action="clear">C</button>
                <button class="btn btn-action" id="btn-backspace" data-action="backspace" aria-label="Backspace"><i class="fa-solid fa-delete-left"></i></button>
                <button class="btn btn-operator" data-action="operator" data-val="%">%</button>
                <button class="btn btn-operator" data-action="operator" data-val="/">&divide;</button>

                <!-- Row 2 -->
                <button class="btn btn-num" data-action="num" data-val="7">7</button>
                <button class="btn btn-num" data-action="num" data-val="8">8</button>
                <button class="btn btn-num" data-action="num" data-val="9">9</button>
                <button class="btn btn-operator" data-action="operator" data-val="*">&times;</button>

                <!-- Row 3 -->
                <button class="btn btn-num" data-action="num" data-val="4">4</button>
                <button class="btn btn-num" data-action="num" data-val="5">5</button>
                <button class="btn btn-num" data-action="num" data-val="6">6</button>
                <button class="btn btn-operator" data-action="operator" data-val="-">&minus;</button>

                <!-- Row 4 -->
                <button class="btn btn-num" data-action="num" data-val="1">1</button>
                <button class="btn btn-num" data-action="num" data-val="2">2</button>
                <button class="btn btn-num" data-action="num" data-val="3">3</button>
                <button class="btn btn-operator" data-action="operator" data-val="+">+</button>

                <!-- Row 5 -->
                <button class="btn btn-num double-width" data-action="num" data-val="0">0</button>
                <button class="btn btn-num" data-action="num" data-val=".">.</button>
                <button class="btn btn-equals" id="btn-equals" data-action="equals" aria-label="Equals">=</button>
            </section>
        </main>

        <!-- Slide-out History Panel -->
        <aside class="history-panel" id="history-panel">
            <div class="history-header">
                <h2>Calculation History</h2>
                <div class="history-actions">
                    <button id="clear-history-btn" class="text-btn" aria-label="Clear database history">Clear All</button>
                    <button id="history-close-btn" class="icon-btn" aria-label="Close History"><i class="fa-solid fa-times"></i></button>
                </div>
            </div>
            <div class="history-list" id="history-list">
                <!-- Dynamically populated calculation cards -->
                <div class="empty-state">
                    <i class="fa-regular fa-folder-open"></i>
                    <p>No history yet. Start calculating!</p>
                </div>
            </div>
        </aside>
    </div>

    <!-- Active Toast Notifications -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Custom JavaScript -->
    <script src="{{ url_for('static', filename='js/calculator.js') }}"></script>
</body>
</html>
